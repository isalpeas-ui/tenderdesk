name: Supabase weekly encrypted backup

# Dumps the whole TenderDesk database weekly, encrypts it with AES-256, and
# stores it as a workflow artifact (90-day retention). Encrypted, so it is
# safe even while the repo is public.
#
# Required secrets:
#   SUPABASE_DB_URL    - postgres connection string (Supabase: Settings > Database)
#   BACKUP_PASSPHRASE  - any strong passphrase; keep a copy in your vault
#
# Restore:
#   openssl enc -d -aes-256-cbc -pbkdf2 -in tenderdesk.sql.enc -pass pass:<PASSPHRASE> | psql "$DB_URL"

on:
  schedule:
    - cron: "30 4 * * 1"   # Mondays 04:30 UTC
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgres client
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q postgresql-client

      - name: Dump + encrypt
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ] || [ -z "$BACKUP_PASSPHRASE" ]; then
            echo "Secrets missing - set SUPABASE_DB_URL and BACKUP_PASSPHRASE."
            exit 1
          fi
          pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges \
            | gzip \
            | openssl enc -aes-256-cbc -pbkdf2 -pass env:BACKUP_PASSPHRASE \
            -out tenderdesk-$(date -u +%Y%m%d).sql.gz.enc
          ls -la *.enc

      - uses: actions/upload-artifact@v4
        with:
          name: tenderdesk-backup-${{ github.run_id }}
          path: "*.enc"
          retention-days: 90
