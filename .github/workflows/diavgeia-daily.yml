name: Diavgeia daily harvest

# Daily tender alerts + nationwide discovery; award harvest (incremental on
# Mondays, deep backfill on demand). Runs on a GitHub-hosted runner (open
# internet), upserts results into Supabase (assets + tenders), commits the JSON
# debug trail, and opens an issue when new target-org tenders match.

on:
  schedule:
    # GitHub cron is UTC. 04:00 UTC ≈ 07:00 Athens (summer) / 06:00 (winter).
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      run_harvest:
        description: "Deep award backfill now (3-year lookback over all clients)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

concurrency:
  group: diavgeia-harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Tender alerts (target orgs)
        run: python scripts/diavgeia_harvest.py --mode alerts

      - name: Nationwide discovery (new orgs buying cyber)
        run: python scripts/diavgeia_harvest.py --mode discover

      - name: Award harvest (assets)
        run: |
          if [ "${{ github.event.inputs.run_harvest }}" = "true" ]; then
            echo "Manual deep backfill (config lookback)."
            python scripts/diavgeia_harvest.py --mode harvest
          elif [ "$(date -u +%u)" = "1" ]; then
            echo "Monday incremental harvest (21-day lookback)."
            HARVEST_LOOKBACK_DAYS=21 python scripts/diavgeia_harvest.py --mode harvest
          else
            echo "Skipping award harvest today (runs Mondays / on demand)."
          fi

      - name: Commit updated data
        run: |
          git config user.name  "diavgeia-bot"
          git config user.email "actions@github.com"
          git add diavgeia/*.json diavgeia/_new_today.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Diavgeia harvest: $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Open issue for new tenders
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s diavgeia/_new_today.md ]; then
            gh issue create \
              --title "New Diavgeia tenders — $(date -u +%Y-%m-%d)" \
              --body-file diavgeia/_new_today.md \
              --label "diavgeia" || echo "Issue creation skipped (label may not exist)."
          else
            echo "No new tenders today — no issue opened."
          fi
